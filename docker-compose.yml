services:
  api:
    build: .
    container_name: clinic-api
    command: npm run dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy   # ✅ wait for real DB readiness

  frontend:
    build: ./frontend
    container_name: clinic-frontend
    command: npm run dev
    ports:
      - "5173:5173"
    depends_on:
      - api

  db:
    image: postgres:15
    container_name: clinic-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clinic
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    # ✅ Native healthcheck — replaces manual waitForDB loop in app.js
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clinic"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data: